version: 2
updates:
- package-ecosystem: cargo
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  labels:
  - dependencies
  commit-message:
    prefix: "chore"
    prefix-development: "chore"
    include: "scope"
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  labels:
  - dependencies
  commit-message:
    prefix: "ci"
    include: "scope"
